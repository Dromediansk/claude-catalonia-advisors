<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    max-width: 760px;
    margin: 2.5rem auto;
    padding: 0 1.25rem;
    line-height: 1.6;
    color: #1d1d1f;
    background: #fdfdfa;
  }
  h1, h2, h3 {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.25;
    color: #0f3057;
  }
  h1 { font-size: 1.9rem; border-bottom: 1px solid #e5e5e5; padding-bottom: .35rem; }
  h2 { font-size: 1.35rem; margin-top: 2rem; }
  h3 { font-size: 1.1rem; }
  .meta { color: #666; font-size: .9rem; margin-bottom: 1.5rem; }
  sup a { text-decoration: none; color: #0f3057; }
  ul, ol { padding-left: 1.4rem; }
  .sources {
    margin-top: 2.5rem;
    border-top: 1px solid #e5e5e5;
    padding-top: 1rem;
    font-size: .9rem;
    color: #444;
  }
  .sources h2 { font-size: 1.05rem; color: #444; }
  .sources a { color: #0f3057; word-break: break-word; }
  @media print {
    body { color: #000; background: #fff; }
    a { color: #000; }
  }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
<div class="meta">Generated {{DATE}} · catalonia-trip-advisor</div>
{{BODY}}
<section class="sources">
<h2>Sources</h2>
{{SOURCES}}
</section>
</body>
</html>
